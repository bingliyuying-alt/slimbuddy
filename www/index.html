<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#c4a0ff">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>SlimBuddy</title>
<style>
/* ===== Design System ===== */
:root {
  --bg-primary: #0f0f1a;
  --bg-card: rgba(25, 23, 40, 0.85);
  --bg-card-hover: rgba(35, 32, 55, 0.9);
  --bg-input: rgba(15, 14, 28, 0.7);
  --border: rgba(255,255,255,0.06);
  --border-active: rgba(255,255,255,0.12);
  --text-primary: #f0edf5;
  --text-secondary: #8b87a3;
  --text-tertiary: #5c5870;
  --accent: #c4a0ff;
  --accent-soft: rgba(196, 160, 255, 0.15);
  --green: #6ee7b7;
  --green-soft: rgba(110, 231, 183, 0.15);
  --gold: #fbbf77;
  --gold-soft: rgba(251, 191, 119, 0.15);
  --rose: #fb7185;
  --rose-soft: rgba(251, 113, 133, 0.15);
  --sky: #7dd3fc;
  --sky-soft: rgba(125, 211, 252, 0.15);
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 10px;
  --font-mono: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  min-height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 18px 100px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.01em;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(196,160,255,0.08), transparent),
    radial-gradient(ellipse 60% 40% at 90% 80%, rgba(110,231,183,0.05), transparent);
  background-attachment: fixed;
}

/* ===== Header ===== */
header {
  position: sticky; top:0; z-index:50;
  padding: 18px 0 12px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: rgba(15,15,26,0.75);
  border-bottom: 1px solid var(--border);
}
.header-top { display:flex; justify-content:space-between; align-items:center; }
.logo { font-size:1.35em; font-weight:700; letter-spacing:-0.02em; }
.logo span { color:var(--accent); }
.weather-tag {
  font-size: 0.8em; color: var(--text-secondary);
  display:flex; align-items:center; gap:6px;
  background: var(--bg-input); padding:6px 12px; border-radius:20px;
}

/* ===== Weight Hero ===== */
.hero {
  text-align:center; padding: 24px 0 18px;
  position: relative;
}
.weight-ring {
  display: inline-flex; flex-direction:column; align-items:center;
  position: relative;
}
.weight-value {
  font-size: 4.5em; font-weight: 800; letter-spacing: -0.03em;
  line-height: 1;
  background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.weight-unit { font-size:0.22em; font-weight:500; color:var(--text-secondary); -webkit-text-fill-color: var(--text-secondary); }
.weight-date { font-size:0.78em; color:var(--text-tertiary); margin-top:4px; }
.trend-badge {
  display: inline-flex; align-items:center; gap:5px;
  padding: 5px 14px; border-radius: 20px;
  font-size: 0.82em; font-weight:600; margin-top:10px;
  letter-spacing: -0.01em;
}
.trend-down { background: var(--green-soft); color: var(--green); }
.trend-up { background: var(--rose-soft); color: var(--rose); }
.trend-stable { background: var(--gold-soft); color: var(--gold); }
.scale-actions { display:flex; gap:8px; justify-content:center; margin-top:14px; }

/* ===== Buttons ===== */
.btn {
  display: inline-flex; align-items:center; justify-content:center; gap:6px;
  padding: 11px 22px; border: none; border-radius: var(--radius-sm);
  font-size: 0.92em; font-weight: 600; cursor: pointer;
  transition: var(--transition);
  letter-spacing: -0.01em;
  font-family: inherit;
}
.btn:active { transform:scale(0.97); }
.btn-primary { background: var(--accent); color: #0f0f1a; }
.btn-primary:hover { background: #d4b8ff; }
.btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--border-active); color: var(--text-primary); }
.btn-green { background: var(--green); color: #0f0f1a; }
.btn-sm { padding:7px 15px; font-size:0.82em; border-radius:20px; }

/* ===== Motto ===== */
.motto {
  text-align:center; padding: 10px 0 18px;
  font-style: italic; color: var(--accent);
  font-size: 0.95em; opacity:0.85;
}

/* ===== Meal Cards ===== */
.section-label {
  font-size:0.78em; font-weight:700; color:var(--text-tertiary);
  text-transform:uppercase; letter-spacing:0.08em;
  margin: 10px 0 10px;
}
.meal {
  background: var(--bg-card);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  margin-bottom: 10px;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.meal::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width: 3px;
  border-radius: 3px 0 0 3px;
  transition: var(--transition);
}
.meal-bf::before { background: var(--gold); }
.meal-lu::before { background: var(--accent); }
.meal-di::before { background: var(--sky); }
.meal-ex::before { background: var(--green); }
.meal.done { opacity: 0.6; }
.meal.done::before { opacity: 0.4; }
.meal-header { display:flex; justify-content:space-between; align-items:flex-start; }
.meal-icon { font-size:1.25em; }
.meal-info { flex:1; margin-left:10px; }
.meal-title { font-weight: 650; font-size:1em; letter-spacing:-0.01em; }
.meal-desc { color: var(--text-secondary); font-size:0.85em; margin-top:3px; line-height:1.45; }
.meal-reason {
  color: var(--text-tertiary); font-size:0.78em; margin-top:6px;
  display:flex; align-items:center; gap:4px;
}
.meal-actions { display:flex; gap:8px; margin-top:12px; }
.badge-check {
  display: inline-flex; align-items:center; gap:4px;
  background: var(--green-soft); color: var(--green);
  padding: 5px 12px; border-radius:20px;
  font-size:0.78em; font-weight:600;
}

/* ===== Bottom Nav ===== */
.bottom-nav {
  position: fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px;
  background: rgba(20,18,32,0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom, 0px));
  z-index: 100;
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
  padding: 6px 0; cursor: pointer; transition: var(--transition);
  color: var(--text-tertiary); font-size:0.7em; font-weight:600;
  border: none; background: none;
  letter-spacing: -0.01em;
  font-family: inherit;
}
.nav-item.active { color: var(--accent); }
.nav-item .nav-icon { font-size:1.5em; transition: var(--transition); }
.nav-dot {
  width:5px; height:5px; border-radius:50%;
  background: var(--accent); opacity:0;
  transition: var(--transition);
}
.nav-item.active .nav-dot { opacity:1; }

/* ===== Progress ===== */
.progress { display:flex; gap:8px; justify-content:center; margin:8px 0 2px; }
.progress-dot {
  width:8px; height:8px; border-radius:50%;
  background: rgba(255,255,255,0.1);
  transition: var(--transition);
}
.progress-dot.done { background: var(--green); box-shadow:0 0 8px rgba(110,231,183,0.5); }

/* ===== Week View ===== */
.week-card {
  background: var(--bg-card); border:1px solid var(--border);
  border-radius: var(--radius-lg); padding:20px;
  margin-bottom:12px;
}
.week-title { font-size:1.1em; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.week-row {
  display:flex; align-items:center; gap:10px; padding:10px 0;
  border-bottom:1px solid var(--border);
}
.week-row:last-child { border:none; }
.week-day-label { width:38px; font-weight:700; font-size:0.85em; }
.week-day-date { width:42px; color: var(--text-tertiary); font-size:0.78em; }
.week-input {
  flex:1; background: var(--bg-input); border:1px solid var(--border);
  color: var(--text-primary); border-radius: var(--radius-sm);
  padding: 10px 14px; font-size:0.85em; font-family:inherit;
  transition: var(--transition);
}
.week-input:focus { outline:none; border-color:var(--accent); background:rgba(196,160,255,0.05); }

/* ===== Victory View ===== */
.victory-hero { text-align:center; padding: 30px 0; }
.victory-emoji { font-size:4em; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.victory-title { font-size:1.4em; font-weight:800; margin:12px 0 4px; }
.victory-sub { color:var(--text-secondary); font-size:0.9em; }
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:20px 0; }
.stat-card {
  background: var(--bg-card); border:1px solid var(--border);
  border-radius: var(--radius-md); padding:16px; text-align:center;
}
.stat-value { font-size:1.5em; font-weight:800; }
.stat-label { color:var(--text-tertiary); font-size:0.75em; margin-top:4px; }
.insight-list { margin-top:16px; }
.insight-item {
  padding:12px; background: var(--bg-card); border:1px solid var(--border);
  border-radius: var(--radius-sm); margin-bottom:8px;
  font-size:0.88em; color: var(--text-secondary);
}

/* ===== Gap Banner ===== */
.gap-banner {
  background: linear-gradient(135deg, rgba(196,160,255,0.1), rgba(125,211,252,0.05));
  border: 1px solid rgba(196,160,255,0.2);
  border-radius: var(--radius-lg); padding:20px; text-align:center; margin-bottom:14px;
}
.gap-banner p { color:var(--text-secondary); line-height:1.7; font-size:0.9em; margin-bottom:12px; }

/* ===== Modal ===== */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.8);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  z-index:200; display:flex; align-items:flex-end; justify-content:center;
}
.modal-sheet {
  background: var(--bg-card); border:1px solid var(--border);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 24px; max-width:480px; width:100%; max-height:80vh;
  overflow-y:auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-close {
  float:right; background:none; border:none; color:var(--text-tertiary);
  font-size:1.5em; cursor:pointer; padding:4px 8px;
}

/* ===== Input ===== */
.input {
  width:100%; background:var(--bg-input); border:1px solid var(--border);
  color:var(--text-primary); border-radius:var(--radius-sm);
  padding:12px 16px; font-size:0.95em; font-family:inherit;
  transition: var(--transition);
}
.input:focus { outline:none; border-color:var(--accent); }

/* ===== Hidden ===== */
.hidden { display:none !important; }

/* ===== Photo preview ===== */
.photo-thumb {
  width:60px; height:60px; border-radius:10px; object-fit:cover;
  border: 1px solid var(--border);
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--text-tertiary); border-radius:10px; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">Slim<span>Buddy</span></div>
    <button id="settings-btn" style="background:none;border:none;font-size:1.2em;cursor:pointer;padding:4px 8px" onclick="openSettings()">жѕ┐ТгЎугЇ</button>
    <div class="weather-tag" id="weather-tag">--</div>
  </div>
</header>

<main id="main-content">
  <!-- Views are rendered here -->
</main>

<nav class="bottom-nav" id="bottom-nav">
  <button class="nav-item active" data-view="today">
    <span class="nav-icon">жѕйРѓгжћћ?/span> ТхатЕЃТБЕ
    <span class="nav-dot"></span>
  </button>
  <button class="nav-item" data-view="week">
    <span class="nav-icon">ждЃТљ«</span> жЈѕЬёђТЄє
    <span class="nav-dot"></span>
  </button>
  <button class="nav-item" data-view="victory">
    <span class="nav-icon">ждЃт╝│</span> жЉ│Т╗ЃтЪё
    <span class="nav-dot"></span>
  </button>
</nav>

<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal-sheet" id="modal-content"></div>
</div>

<script src="db.js"></script>
<script src="plan.js"></script>
<script>
// ===== State =====
let currentView = 'today';
let todayData = null;

// ===== Init =====
document.addEventListener('DOMContentLoaded', async () => {
  await DB.initDB();
  setupNav();
  loadWeather();
  loadToday();
  checkGap();
});

async function loadWeather() {
  try {
    const r = await fetch('https://wttr.in/Wuxi?format=%C+%t&lang=zh');
    const raw = await r.text();
    const text = raw.replace(/<[^>]+>/g, '').trim();
    document.getElementById('weather-tag').textContent = text || '--';
  } catch(e) {
    document.getElementById('weather-tag').textContent = '--';
  }
}

function setupNav() {
  document.querySelectorAll('#bottom-nav .nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('#bottom-nav .nav-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      currentView = item.dataset.view;
      switchView(currentView);
    });
  });
}

function switchView(view) {
  const main = document.getElementById('main-content');
  main.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-tertiary)">жЇћуі║ТхЄТХЊ?..</div>';
  if (view === 'today') loadToday();
  else if (view === 'week') loadWeekView();
  else if (view === 'victory') loadVictoryView();
}

// ===== Today View =====
async function loadToday() {
  const today = new Date().toISOString().slice(0, 10);
  const weight = await DB.getLatestWeight();
  const checkins = await DB.getTodayCheckins(today);
  const lastCheckin = await DB.getLastCheckinDate();
  let gapDays = null;
  if (lastCheckin && lastCheckin !== today) {
    const last = new Date(lastCheckin);
    gapDays = Math.floor((new Date() - last) / 86400000);
  }

  const data = {
    date: today,
    weight: weight ? weight.weight_kg : null,
    weight_id: weight ? weight.id : null,
    checkins: checkins,
    gap_days: gapDays,
  };
  todayData = data;

  const w = data.weight;
  let html = '';

  if (data.gap_days && data.gap_days > 0) {
    html += `<div class="gap-banner">
      <p>жЇбтїАу┤њ ${data.gap_days} ТЙХРЋѓуЌЁуЉЎСйиу░А<br>уђ╣т▒йтЈЈтеїРђ│тЈДу╗»С╝Ўу┤ЮжЈѕРѓгТЮЕТѕъРѓгт║Юу«ъжЈЇтЄцу┤х</p>
      <button class="btn btn-sm btn-ghost" onclick="recoverGap()">жј┤ТѕЮТ┤ќжЈЅсЃцу░АжћЏ?/button>
    </div>`;
  }

  html += `<div class="hero">
    <div class="weight-ring">
      <div class="weight-value">${w ? w.toFixed(1) : '--'}<span class="weight-unit"> kg</span></div>
      ${w ? `<div class="weight-date">ТХЊтЕЃЬѓ╝жћЏ?${data.date}</div>` : ''}
    </div>
    <div class="scale-actions">
      <button class="btn btn-sm btn-ghost" onclick="scanScale()">ТЮЕуѓ┤тИ┤у╗Ѕ?/button>
      <button class="btn btn-sm btn-ghost" onclick="manualWeight()">жјхтгфтДЕТЮѕТњ│тЈє</button>
      ${w ? `<button class="btn btn-sm btn-ghost" onclick="deleteWeight(${data.weight_id})" style="color:var(--rose)">жЇњуі╗ТФјуњЂТЮ┐уХЇ</button>` : ''}
    </div>
    <div id="health-metrics" style="display:flex;justify-content:center;gap:16px;margin-top:8px;font-size:0.78em;color:var(--text-secondary)"></div>
  </div>`;

  if (data.checkins && data.checkins.length > 0) {
    html += '<div class="progress">';
    ['breakfast','lunch','dinner','exercise'].forEach(t => {
      const done = data.checkins.find(c => c.meal_type === t && c.completed);
      html += `<div class="progress-dot ${done?'done':''}"></div>`;
    });
    html += '</div>';
  }

  if (w) {
    html += '<div class="section-label">ТхатЕЃТБЕуњЂРђ│тъЮ</div>';
    html += '<div id="plan-area">жЇћуі║ТхЄТХЊ?..</div>';
  } else {
    html += '<div style="text-align:center;padding:24px 16px;color:var(--text-tertiary);font-size:0.9em">ждЃТљх жЇЈтаБЬєЄУц░ТЏџуХІжќ▓тХЈу┤ЮжЇљтХёУ┤ЪТхБуіхТЋЊжј┤Тёфу▓ќжЈЃсЃеЬЁИжЇњ?/div>';
  }

  document.getElementById('main-content').innerHTML = html;
  if (w) await loadPlan();
}

async function loadPlan() {
  const weather = document.getElementById('weather-tag').textContent;
  const today = new Date().toISOString().slice(0, 10);

  let plan = await DB.getTodayPlan(today);
  const now = new Date();
  if (plan && now.getHours() >= 4 && plan.plan_date < today) plan = null;

  if (!plan) {
    const latest = await DB.getLatestWeight();
    const w = latest ? latest.weight_kg : null;
    if (!w) { document.getElementById('plan-area').innerHTML = ''; return; }
    const g = await PlanEngine.generateDailyPlan(today, weather, w);
    await DB.saveTodayPlan(today,
      JSON.stringify(g.breakfast), JSON.stringify(g.lunch),
      JSON.stringify(g.dinner), JSON.stringify(g.exercise),
      JSON.stringify({ motto: g.motto, schedule: g.schedule }));
    plan = g;
  } else {
    plan = {
      date: today,
      breakfast: JSON.parse(plan.breakfast || 'null'),
      lunch: JSON.parse(plan.lunch || 'null'),
      dinner: JSON.parse(plan.dinner || 'null'),
      exercise: JSON.parse(plan.exercise || 'null'),
      extra: JSON.parse(plan.extra_notes || '{}'),
      modified: !!plan.modified,
    };
  }

  let mel = document.querySelector('.motto');
  const mt = (plan.extra && plan.extra.motto) || 'ТхБуі▓тй▓ТхасЃДТ«Љжіє?;
  if (mel) mel.textContent = mt;
  else { mel = document.createElement('div'); mel.className = 'motto'; mel.textContent = mt; document.getElementById('plan-area').parentNode.insertBefore(mel, document.getElementById('plan-area')); }

  const meals = [
    { key: 'breakfast', emoji: 'ждЃт»ў', cls: 'meal-bf' },
    { key: 'lunch', emoji: 'жѕйРѓгжћћ?, cls: 'meal-lu' },
    { key: 'dinner', emoji: 'ждЃт»х', cls: 'meal-di' },
  ];

  let planHtml = '';
  meals.forEach(m => {
    const item = plan[m.key];
    if (!item) return;
    const isChecked = todayData && todayData.checkins && todayData.checkins.find(c => c.meal_type === m.key && c.completed);
    planHtml += `<div class="meal ${m.cls} ${isChecked?'done':''}">
      <div class="meal-header">
        <span class="meal-icon">${m.emoji}</span>
        <div class="meal-info">
          <div class="meal-title">${item.name || m.key}  <span style="color:var(--gold);font-size:0.8em;font-weight:400">ждЃТЋЪ ${item.calories||'?'} kcal</span></div>
          <div class="meal-desc">${item.detail || ''}</div>
          ${item.reason ? `<div class="meal-reason">${isChecked ? 'жЅЂ?т«ИтЈЅтбджЇЌ? : 'ждЃТїЋ '+item.reason}</div>` : (isChecked ? '<div class="meal-reason">жЅЂ?т«ИтЈЅтбджЇЌ?/div>' : '')}
        </div>
      </div>
      <div class="meal-actions">
        <button class="btn btn-sm ${isChecked?'btn-ghost':'btn-green'}" onclick="openCheckin('${m.key}')">${isChecked ? 'жЅЂ?т«ИтЈЅтбджЇЌ? : 'жјхТњ│т┤▒'}</button>
        <button class="btn btn-sm btn-ghost" onclick="editMeal('${m.key}')">ТиЄЬєйТЋ╝</button>
      </div>
    </div>`;
  });

  const ex = plan.exercise;
  if (ex) {
    const exChecked = todayData && todayData.checkins && todayData.checkins.find(c => c.meal_type === 'exercise' && c.completed);
    planHtml += `<div class="meal meal-ex ${exChecked?'done':''}">
      <div class="meal-header">
        <span class="meal-icon">ждЃт╝«</span>
        <div class="meal-info">

async function scanScale() {
  if (!navigator.bluetooth) { alert('жњЃТ┐ѕтб«жЇћує╗тЁўжЌЄРѓгуЉЋСй╣тбюжЈѕ?Chrome те┤т┐џЬЮЇжЇБРЋўnуњЄт│░Т╣фжјхтгФТ║ђТХЊтЕёТЋц Chrome жјхТњ│у┤ЉтДЮсѓЅсђЅжЌѕ?); return; }
  const UUID = '0000181b-0000-1000-8000-00805f9b34fb';
  showModal('ТЮЕуѓ┤тИ┤уЂЈт┐ЋУЃїу╗Ѕ?, `<p style="text-align:center;padding:16px;color:var(--text-secondary)">жЇЌтє▓уџбт»«уЉ░тџГжњЃТ┐ѕтб«уњЂТЃДЬўгжќФтцІтФежЇБ?br><small>жќФтцІтФеТхБуіхТ«ЉуЂЈт┐ЋУЃїТхБТњ╣тЅЏу╗Ѕ?/small></p><button class="btn btn-primary" style="width:100%" id="bluetooth-pair-btn">ждЃТћ│ т»«РѓгТ┐«тгФТѓ│у╗▒?/button>`);
  document.getElementById('bluetooth-pair-btn').onclick = async () => {
    let device;
    try { device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: [UUID] }); }
    catch (e) { closeModal(); if (e.name !== 'NotFoundError') alert('жњЃТ┐ѕтб«жќ┐ТгњЬЄцжћЏ? + (e.message||'')); return; }
    document.getElementById('modal-content').innerHTML = `<button class="modal-close" onclick="closeModal()">&times;</button><h3>тДЮ№йЁТ╣фжј╝Т╗Ётѓе ${device.name||'уЂЈт┐ЋУЃїу╗Ѕ?}...</h3><p style="text-align:center;padding:20px;color:var(--text-secondary)">у╗ћТгјугѓу╗ЅсѓЈу┤ЮТиЄТ┐Єт»ћу╗ћТгЉКћ<br><small>у╗ЏтціуиЪуњЄу╗ўТџЪу╗Ітє▓уЋЙ...</small></p>`;
    const readings = []; let scan = true;
    try {
      await device.gatt.connect(); await device.watchAdvertisements();
      device.addEventListener('advertisementreceived', e => { if(!scan)return; try{const d=e.serviceData.get(UUID);if(d){const w=_psw(d);if(w)readings.push({t:Date.now(),w});}}catch(_){} });
      await new Promise(resolve => { const dl=Date.now()+30000; const ck=setInterval(()=>{if(!scan){clearInterval(ck);resolve();return;} const l=readings.length?readings[readings.length-1].t:0; if(readings.length>0&&Date.now()-l>2500){clearInterval(ck);resolve();} if(Date.now()>dl){clearInterval(ck);resolve();} },600); });
      scan=false; await device.gatt.disconnect();
    } catch(e) { scan=false; closeModal(); alert('ТЮЕуѓ┤тИ┤ТЙХУЙФУДджћЏ?+(e.message||'')); return; }
    closeModal(); if(!readings.length){alert('жЈѕЬЂЁЬЌЁте┤тгфтЪїуњЄу╗ўТџЪ');return;}
    const r=readings.slice(-5).map(x=>x.w).sort((a,b)=>a-b); const w=r[Math.floor(r.length/2)];
    await DB.saveWeight(w,'scale'); const t=new Date().toISOString().slice(0,10); const p=await DB.getTodayPlan(t); if(p)await DB.saveTodayPlan(t,null,null,null,null,'');
    loadToday();
  };
}
function _psw(d){if(d.byteLength<10)return null;const r=d.getUint16(d.byteLength-2,true);const w=r*0.005;return(w>20&&w<250)?Math.round(w*10)/10:null;}

async function manualWeight() {
  const w = prompt('ТЮѕТњ│тЈєТхБТњ╗тЎИжћЏтЮўgжћЏтцЏу┤░'); if (!w) return;
  const kg = parseFloat(w); if (isNaN(kg) || kg < 30 || kg > 200) return;
  await DB.saveWeight(kg, 'manual'); const t = new Date().toISOString().slice(0,10);

}

  html += '<input id="set-height" class="input" type="number" placeholder="жЪгЬѓдуЈ« cm" style="margin-bottom:8px">';
  html += '<input id="set-age" class="input" type="number" placeholder="жфъТњ«уиъ" style="margin-bottom:8px">';
  html += '<select id="set-activity" class="input" style="margin-bottom:8px"><option value="sedentary">ТХћтЉГТйЌ</option><option value="light" selected>ТЮъУ»▓т«│те▓У»▓тДЕ</option><option value="moderate">ТХЊЬЁът«│те▓У»▓тДЕ</option><option value="active">ТЦѓТе║т«│те▓У»▓тДЕ</option></select>';
  html += '<input id="set-allergies" class="input" placeholder="ТЮЕтЏеТЎ▒жЇў? style="margin-bottom:8px">';
  html += '<input id="set-conditions" class="input" placeholder="жј▒сѕАРѓгЛЁТбЙ" style="margin-bottom:8px">';
  html += '<input id="set-meds" class="input" placeholder="жЈѕтХѕтхѓжј»тЉГтќї" style="margin-bottom:12px">';
  html += '<button class="btn btn-primary" style="width:100%" onclick="saveSettings()">ТиЄТ┐єуЊеуњЂтЅДуќє</button>';
  showModal('жѕ┐ТгЎугЇ уњЂтЅДуќє', html);
  try {
    const profile = await DB.getUserProfile();
    if (profile) {
      document.getElementById('set-height').value = profile.height_cm || '';
      document.getElementById('set-age').value = profile.age || '';
      document.getElementById('set-activity').value = profile.activity_level || 'light';
      document.getElementById('set-allergies').value = profile.allergies || '';
      document.getElementById('set-conditions').value = profile.conditions || '';
      document.getElementById('set-meds').value = profile.medications || '';
      const latest = await DB.getLatestWeight(); const w = latest ? latest.weight_kg : null;
      const bmi = Health.calcBMI(w, profile.height_cm); const bmr = Health.calcBMR(w, profile.height_cm, profile.age);
      const tdee = Health.calcTDEE(bmr, profile.activity_level); const target = Health.calcTargetCalories(tdee);
      let s = ''; if (bmi) s += `BMI ${bmi} Уи» ${Health.bmiLabel(bmi)}<br>`;
      if (bmr) s += `жЇЕУЎ╣ЬћЁТха№йѕжў┐ ${bmr} kcal Уи» жЈЃсЃдуДижЉ░?${tdee} kcal<br>`;
      if (target) s += `ждЃт╣є жЇЉт┐џтЅЏжљЕЬєйуѕБ ${target} kcal/ТЙХсЃ╝;
      document.getElementById('settings-stats').innerHTML = '<div style="color:var(--accent);font-size:0.9em">'+s+'</div>';
    }
  } catch(e) {}
}

async function saveSettings() {
  await DB.updateUserProfile({
    height_cm: parseFloat(document.getElementById('set-height').value) || 171,
    age: parseInt(document.getElementById('set-age').value) || 22,
    activity_level: document.getElementById('set-activity').value,
    allergies: document.getElementById('set-allergies').value,
    conditions: document.getElementById('set-conditions').value,
    medications: document.getElementById('set-meds').value,
  });
  closeModal(); loadToday();
}

// ===== Custom Items =====
function addCustomItem() {
  showModal('теБУ»▓тДъуњЂРђ│тъЮ', `<button class="btn btn-ghost" style="width:100%;margin-bottom:8px" onclick="addCustom('meal')">ждЃтхћжћћ?теБУ»▓тДъТЦЌЬЄђЬЌц</button><button class="btn btn-ghost" style="width:100%" onclick="addCustom('exercise')">ждЃт╝« теБУ»▓тДъТЮЕТёгтДЕ</button>`);
}

async function addCustom(type) {
  closeModal();
  const labels={meal:'ТЦЌЬЄђЬЌц',exercise:'ТЮЕТёгтДЕ'};
  const name=prompt(labels[type]+'жЇџтХЄлъжћЏ?); if(!name) return;
  const detail=prompt(labels[type]+'уњЄ№ИйтёЈжћЏтаЮтй▓уњ║т«ау╣ЃжћЏтцЏу┤░')||'';
  const cal=type==='meal'?(prompt('жљЉЬЁбтЎ║ kcalжћЏтаЮтй▓уњ║т«ау╣ЃжћЏтцЏу┤░')||'0'):'0';
  const today=new Date().toISOString().slice(0,10);
  const plan=await DB.getTodayPlan(today);
  if(plan){
    const f=type==='meal'?'breakfast':'exercise';
    const tgt=JSON.parse(plan[f]||'{}'); tgt.name=name; tgt.detail=detail;
    if(type==='meal') tgt.calories=parseInt(cal)||0; else tgt.calories_burn=parseInt(cal)||0;
    await DB.saveTodayPlan(today,type==='meal'?JSON.stringify(tgt):plan.breakfast,plan.lunch,plan.dinner,type==='exercise'?JSON.stringify(tgt):plan.exercise,plan.extra_notes);
    loadPlan();
  }
}

async function recoverGap() {
  const note = prompt('ТЮЕТгЈтџЉТЙХРЋѓРѓгт║Юу«ъжЈЇтЄцу┤хжЌЁт┐јуЕХуњЄуБІЬЄЕуЂЈтЇъсѓй :)');
  if (note) await DB.saveBodyState(new Date().toISOString().slice(0,10), null, null, note, null);
  loadToday();
}

// ===== Modal =====
function showModal(title, content) {
  document.getElementById('modal-content').innerHTML = `<button class="modal-close" onclick="closeModal()">&times;</button><h3 style="margin-bottom:12px">${title}</h3>${content}`;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }

// ===== Export =====
function exportReport() {
  const days = prompt('уђхуЁјтџГжЈѕРѓгТЮЕТѕЮтџЉТЙХРЋІу┤х', '7'); if (!days) return;
  fetch('/api/export?days='+days).then(r=>{if(r.ok)r.blob().then(b=>{const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='SlimBuddy_Report.docx';a.click();});else throw new Error('no');}).catch(()=>alert('уђхуЁјтџГжЌЄРѓгуЉЋСйИТѓЌу╗ћЬѕЏТЋ«жјИС╣ЌnжЈѕЬёђТ╣┤ТЮЕТё»ЬћЉ python app.py жЇЌтє▓тй▓'));
}

// ===== AI Roast =====
function generateRoast(name, calories) {
  const cal = parseInt(calories) || 0;
  let pool;
  if (cal <= 150) pool = [`"${name}"жјх?{cal}kcalжћЏт▒╝уХўжЈёЬѕџсЂЅТхБтъ«ТЃѓ ждЃТДє`,`${cal}kcalжћЏт▓Ѓу╣ќТХћтаЪуФ╗теБРўЁу┤ЮжЪгЬѓАуХІТх╝Т░│жў┐уњІЬЮГуХўжље?ждЃт░Х`,`"${name}"жћЏ?{cal}kcalжієтѓЎу«╣жћЏт▒йТ░ежЈёЬѕЮЬЏдТЮЕТгљуЅ▒ ждЃТєд`,`${cal}kcalжћЏт▒йтЎ║жЉ┤тѓЏ─ЂжЉ╝тєфТЋЊжЈѕЬЃ┐Т▒ЅТхю?уїИТЂЁ,`уЂЈ?{cal}kcalжћЏує║у▓░ТхБуі│уў«ТХЊЬЂёуИЙ ждЃТїї`];
  else if (cal <= 500) pool = [`"${name}"${cal}kcalжћЏт▒ЙЬёюућ»уе┐тйѓжјИсЃ»у┤ЮтеїРёЃуў║жљЦ?ждЃТфф`,`${cal}kcalжћЏт▒╝угЅТЙХТ░ФугЅуЂЈТѕЮтъ░жЇњТ░гсѓй ждЃТєБ`,`"${name}"жћЏ?{cal}kcalжієтѓџТѓєт»░ТЦђу┤ЉУ╣ЄтєЕТИХжќ▓тХѕЬЏд~`,`${cal}kcalжћЏт▓ђКћТхБт┐Цу┤Южј┤ТѕюТ╗ЉжЉ│тђЪУђй жЅЂтЦ░];
  else pool = [`"${name}"жѕЦ№И╣Рѓг?{cal}kcalжћЏт▒╝у▓ќТЙХРЋѓтЁѓжЈђтЅДТЌ▒ТХЊРѓгТХЊтгфЬЄ«жЇџ?ждЃТДњ`,`${cal}kcalжље?${name}"жћЏт▒йсѓйжЇџтєеЬЄ«жЇџЛЇу┤хжј┤ТѕътЎджј┤ТѕътЎд ждЃсЂё`,`${cal}kcalжћЏСй╣ТДЉТЙХРЋёЬєЄт»░ТЦђЬў┐уњДжбЂУб▒тДЮсЃЦТЉЮ ждЃТ»Ю`,`"${name}"жћЏ?{cal}kcalжієтѓЏуЌЁжЇЈт┤ЄжЃ┤жћЏт▒╝уФ┤ТццтЮЌсѓГтДБСйиугЅжј║тцЅуХў ждЃТїЇ`,`${cal}kcalжћЏт▓ЃЬєЄТХЊтгФТйхТхютћд ТХЊтХѕуўјжЇњсѓЈу┤ЮжЇЎЬЂЁТДИжЌёЬЂЃуХўжљфтггТйЃ ждЃЬЂ│`];
  return pool[Math.floor(Math.random() * pool.length)];
}
